services:
  - type: web
    name: ro-product-api
    runtime: docker
    repo: https://github.com/your-org/your-repo
    dockerfilePath: backend/api/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ro-product-db
          property: connectionString
      - key: SEARCH_PROVIDER
        value: manual
      - key: ALLOWED_DOMAINS
        sync: false
      - key: MANUAL_TOP_URLS_PER_DOMAIN
        value: "3"

databases:
  - name: ro-product-db

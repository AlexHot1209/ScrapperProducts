services:
  - type: web
    name: ro-product-api
    runtime: docker
    repo: https://github.com/your-org/your-repo
    dockerfilePath: backend/api/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ro-product-db
          property: connectionString
      - key: SEARCH_PROVIDER
        value: google
      - key: GOOGLE_CSE_API_KEY
        sync: false
      - key: GOOGLE_CSE_CX
        sync: false

databases:
  - name: ro-product-db

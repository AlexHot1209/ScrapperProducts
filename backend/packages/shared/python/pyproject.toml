[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scrapper-shared"
version = "0.1.0"
description = "Shared components for Romanian product discovery scraper"
requires-python = ">=3.11"
dependencies = [
  "beautifulsoup4==4.12.3",
  "httpx==0.27.2",
  "playwright==1.50.0",
  "pydantic==2.10.6",
  "pydantic-settings==2.7.1",
  "python-dateutil==2.9.0.post0",
  "requests==2.32.3",
  "sqlalchemy==2.0.37",
  "psycopg[binary]==3.2.3",
  "tenacity==9.0.0",
  "tldextract==5.1.3",
  "lxml==5.3.0"
]

[tool.setuptools.packages.find]
include = ["scrapper_shared*"]
